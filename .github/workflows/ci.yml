name: build-and-smoke

on:
  push:
  pull_request:

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
      - run: gradle assembleDebug --no-daemon

  protocol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/verify_protocol.py
      - run: python3 -m py_compile edge/icar_yolo_infer.py cloud/mqtt_bridge.py
